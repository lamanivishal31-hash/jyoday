<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', cursive;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: #fff;
}

.card {
  background: rgba(255,255,255,0.15);
  padding: 35px;
  border-radius: 25px;
  text-align: center;
  backdrop-filter: blur(12px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  max-width: 400px;
}

.photo {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 15px;
}

button {
  padding: 12px 25px;
  border-radius: 30px;
  background: #ff4d6d;
  color: white;
  border: none;
}

.hidden { display:none; }

canvas {
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<!-- 🔐 PASSWORD -->
<script>
let pass = prompt("Only for Jyo ❤️ Enter password");
if(pass !== "jyo123"){
 document.body.innerHTML = "<h1 style='margin-top:40%'>Access Denied 💔</h1>";
}
</script>

<!-- 🎶 MUSIC -->
<audio id="music" loop>
  <source src="song.mp3.mpeg" type="audio/mpeg">
</audio>

<!-- 🔊 FIREWORK SOUND -->
<audio id="boom">
  <source src="https://www.soundjay.com/explosion/explosion-01.mp3">
</audio>

<script>
document.body.addEventListener("click", function(){
 document.getElementById("music").play();
}, { once:true });
</script>

<div class="card">
<h1>Happy Birthday, My Love ❤️</h1>

<img src="photo.jpg.jpg" class="photo">

<p>To the most special person in my life 💕</p>

<button onclick="startLoveLetter()">Open My Heart 💌</button>

<div id="message" class="hidden">
<span id="typedText"></span>
</div>

<div id="proposal" class="hidden">
💍 Will you always be mine? ❤️
</div>

<br><br>
<button onclick="startFireworks()">Surprise 🎆</button>

</div>

<canvas id="fire"></canvas>

<script>
// 💌 LOVE LETTER
const text = `💖 Dear Jyo,

On your special day, I just want you to know...
You are the most beautiful part of my life ❤️
Every moment with you feels magical ✨
I am so lucky to have you 💕
Forever yours,
Vishal 💫`;

let i = 0;

function startLoveLetter(){
 document.getElementById("message").style.display="block";
 typeWriter();
}

function typeWriter(){
 if(i < text.length){
  document.getElementById("typedText").innerHTML +=
  text.charAt(i) === '\\n' ? '<br>' : text.charAt(i);
  i++;
  setTimeout(typeWriter,40);
 } else {
  document.getElementById("proposal").style.display="block";
 }
}

// 🎆 REAL FIREWORKS + ROCKET + HEART
function startFireworks(){
 const canvas = document.getElementById("fire");
 const ctx = canvas.getContext("2d");
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;

 let particles = [];
 let rockets = [];

 function createRocket(){
  rockets.push({
    x: Math.random()*canvas.width,
    y: canvas.height,
    speed: 5,
    exploded:false
  });
 }

 function explode(x,y){
  document.getElementById("boom").play();

  for(let i=0;i<80;i++){
    let angle = Math.random()*Math.PI*2;

    // ❤️ heart shape
    let speed = Math.random()*4+2;
    particles.push({
      x:x,
      y:y,
      vx: Math.sin(angle)*speed,
      vy: Math.cos(angle)*speed,
      alpha:1
    });
  }
 }

 function animate(){
  ctx.fillStyle="rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // rockets
  rockets.forEach((r,i)=>{
    r.y -= r.speed;

    ctx.fillStyle="white";
    ctx.fillRect(r.x,r.y,2,10);

    if(r.y < canvas.height/2 && !r.exploded){
      explode(r.x,r.y);
      r.exploded=true;
      rockets.splice(i,1);
    }
  });

  // particles
  particles.forEach((p,i)=>{
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.02;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
    ctx.fill();

    if(p.alpha<=0){
      particles.splice(i,1);
    }
  });

  requestAnimationFrame(animate);
 }

 setInterval(createRocket,700);
 animate();
}

// ❤️ floating hearts
function createHeart(){
 const heart=document.createElement('div');
 heart.innerHTML='❤';
 heart.style.position='absolute';
 heart.style.left=Math.random()*100+'vw';
 heart.style.top='100vh';
 heart.style.color='white';
 heart.style.animation='float 6s linear';
 document.body.appendChild(heart);
 setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,300);

</script>

</body>
</html>
